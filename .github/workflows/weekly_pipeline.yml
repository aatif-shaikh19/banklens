name: BankLens 2.0 -- Weekly Pipeline

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  weekly-pipeline:
    name: ETL -> dbt -> GE Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.11'

      - name: Install dependencies (no cache -- supply chain safety)
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir \
            dbt-core==1.11.6 \
            dbt-bigquery==1.11.1 \
            great-expectations==1.15.2 \
            pandas==3.0.3 \
            python-dotenv==1.0.1 \
            pip-audit==2.8.0

      - name: Audit packages for CVEs
        run: pip-audit --strict

      - name: Configure GCP credentials
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GCP_CREDENTIALS" > /tmp/gcp_creds.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_creds.json" >> $GITHUB_ENV

      - name: dbt run -- rebuild all mart tables
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_DATASET_MARTS: banklens_marts
        run: |
          cd dbt_project
          dbt deps --profiles-dir .
          dbt run --profiles-dir .

      - name: dbt test -- validate all models
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_DATASET_MARTS: banklens_marts
        run: |
          cd dbt_project
          dbt test --profiles-dir .

      - name: Great Expectations quality gate
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: python great_expectations/run_all_checkpoints.py

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gcp_creds.json

      - name: Notify on success
        if: success()
        run: |
          echo "Pipeline completed successfully at $(date -u)"
          echo "Mart tables refreshed: mart_fraud_dashboard, mart_campaign_performance, mart_customer_360"
